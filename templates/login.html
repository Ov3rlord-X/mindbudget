{% extends "base.html" %}
{% block title %}- Login{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 8px;">Welcome Back</h2>
        <p style="text-align: center; color: #888; margin-bottom: 28px; font-size: 14px;">Log in to your MindBudget account</p>

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Enter your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #888;">
            Do not have an account? <a href="{{ url_for('auth.register') }}" style="color: #667eea;">Register here</a>
        </p>
    </div>
</div>
{% endblock %}
