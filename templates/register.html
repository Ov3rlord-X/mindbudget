{% extends "base.html" %}
{% block title %}- Register{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 8px;">Create Your Account</h2>
        <p style="text-align: center; color: #888; margin-bottom: 28px; font-size: 14px;">Join MindBudget and take control of your wellbeing</p>

        <form method="POST">
            <div class="form-group">
                <label>Full Name</label>
                <input type="text" name="fullname" placeholder="Enter your full name" required>
            </div>
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <input type="password" name="password" placeholder="Create a password" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" name="confirm" placeholder="Repeat your password" required>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Create Account</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 14px; color: #888;">
            Already have an account? <a href="{{ url_for('auth.login') }}" style="color: #667eea;">Log in here</a>
        </p>
    </div>
</div>
{% endblock %}
