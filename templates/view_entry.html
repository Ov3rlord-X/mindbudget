{% extends "base.html" %}
{% block title %}- {{ entry.title }}{% endblock %}

{% block content %}
<div class="container" style="max-width: 680px;">
    <div class="card">

        <!-- Header -->
        <div style="margin-bottom: 28px; padding-bottom: 20px; border-bottom: 1px solid #f0f0f0;">
            <h1 style="font-size: 24px; font-weight: 800; color: #333; margin-bottom: 8px; line-height: 1.3;">
                {{ entry.title }}
            </h1>
            <p style="color: #bbb; font-size: 13px;">
                Written on {{ entry.date_written.strftime('%A, %d %B %Y at %I:%M %p') }}
            </p>
        </div>

        <!-- Content -->
        <div style="font-size: 16px; line-height: 1.9; color: #444; white-space: pre-wrap; margin-bottom: 32px;">{{ entry.content }}</div>

        <!-- Actions -->
        <div style="display: flex; gap: 12px; flex-wrap: wrap; padding-top: 20px; border-top: 1px solid #f0f0f0;">
            <a href="{{ url_for('main.journal') }}" class="btn btn-outline">← Back to Journal</a>
            <a href="{{ url_for('main.delete_entry', entry_id=entry.id) }}"
               onclick="return confirm('Delete this entry? This cannot be undone.')"
               class="btn btn-danger">Delete Entry</a>
        </div>

    </div>
</div>

<style>
    body.dark .card div[style*="border-bottom"] { border-bottom-color: #1e1e3e !important; }
    body.dark .card div[style*="border-top"]    { border-top-color: #1e1e3e !important; }
    body.dark div[style*="color: #444"] { color: #ddd !important; }
    body.dark h1[style*="color: #333"]  { color: #e0e0e0 !important; }
</style>
{% endblock %}
