{% extends "base.html" %}
{% block title %}- Login{% endblock %}

{% block content %}
<div class="container" style="max-width: 480px;">
    <div class="card">
        <h2 style="text-align: center; margin-bottom: 8px;">Welcome Back</h2>
        <p style="text-align: center; margin-bottom: 28px; font-size: 14px;" class="muted-text">
            Log in to your MindBudget account
        </p>

        <form method="POST">
            <div class="form-group">
                <label>Email Address</label>
                <input type="email" name="email" placeholder="Enter your email" required>
            </div>
            <div class="form-group">
                <label>Password</label>
                <div class="password-wrap">
                    <input type="password" name="password" id="password" placeholder="Enter your password" required>
                    <button type="button" class="eye-btn" onclick="togglePassword()">
                        <span id="eyeIcon">👁</span>
                    </button>
                </div>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%;">Log In</button>
        </form>

        <p style="text-align: center; margin-top: 20px; font-size: 14px;" class="muted-text">
            Do not have an account? <a href="{{ url_for('auth.register') }}" style="color: #667eea;">Register here</a>
        </p>
    </div>
</div>

<style>
    .password-wrap {
        position: relative;
        display: flex;
        align-items: center;
    }

    .password-wrap input {
        padding-right: 48px;
    }

    .eye-btn {
        position: absolute;
        right: 12px;
        background: none;
        border: none;
        cursor: pointer;
        font-size: 18px;
        padding: 4px;
        line-height: 1;
        opacity: 0.6;
        transition: opacity 0.2s;
    }

    .eye-btn:hover { opacity: 1; }
</style>

<script>
    function togglePassword() {
        const field = document.getElementById('password');
        const eye = document.getElementById('eyeIcon');
        if (field.type === 'password') {
            field.type = 'text';
            eye.textContent = '🙈';
        } else {
            field.type = 'password';
            eye.textContent = '👁';
        }
    }
</script>
{% endblock %}
